<div id="galeri-modal" class="modal-popup">
    <span class="close-modal">&times;</span>
    <img class="modal-content-popup" id="img-popup">
    <div id="caption-popup"></div>
</div>

<script>
        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.querySelector('.nav-links');
        const menuOverlay = document.getElementById('menu-overlay'); // Panggil tirainya
        const menuIcon = mobileMenu.querySelector('i'); // Kita panggil elemen <i class="fas ..."> nya
        const closeMenuBtn = document.getElementById('close-menu-btn'); // Tombol X di dalam menu
        const modal = document.getElementById("galeri-modal");
        const modalImg = document.getElementById("img-popup");
        const captionText = document.getElementById("caption-popup");
        const images = document.querySelectorAll(".galeri-item img");
        const texts = document.querySelectorAll(".galeri-overlay span");

        // Fungsi khusus untuk menutup menu
        function closeMenu() {
            navLinks.classList.remove('active');
            menuOverlay.classList.remove('active');
            menuIcon.classList.add('fa-bars');
            menuIcon.classList.remove('fa-times');
        }

        // Buka/Tutup saat ikon garis tiga diklik
        mobileMenu.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            menuOverlay.classList.toggle('active');
            menuIcon.classList.toggle('fa-bars');
            menuIcon.classList.toggle('fa-times');
        });

        // Tutup menu saat area gelap diklik
        menuOverlay.addEventListener('click', closeMenu);

        // Tutup menu saat ikon X di dalam menu diklik
        closeMenuBtn.addEventListener('click', closeMenu);

        // Bikin setiap foto bisa diklik
        images.forEach((img, index) => {
            img.onclick = function() {
                modal.style.display = "flex"; // Munculin pop-up
                modalImg.src = this.src; // Pindahin gambar yang diklik ke pop-up
                captionText.innerHTML = texts[index].innerHTML; // Munculin teksnya juga
            }
        });

        // Ambil tombol X buat nutup
        const span = document.getElementsByClassName("close-modal")[0];

        // Fungsi nutup pas X diklik
        span.onclick = function() {
            modal.style.display = "none";
        }

        // Fungsi nutup pas ngeklik di luar foto (di area hitam)
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>

</body>
